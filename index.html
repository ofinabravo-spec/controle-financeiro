<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle Financeiro PRO (Supabase)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --bg-main: #0f111a;
        --bg-card: #161925;
        --bg-input: #23283b;
        --accent: #00e676;
        --primary: #2979ff;
        --warning: #ff9100;
        --danger: #ff1744;
        --text: #ffffff;
        --text-muted: #a0aec0;
    }
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-main);
        color: var(--text);
    }
    header {
        background: var(--bg-card);
        padding: 20px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        border-bottom: 2px solid #202538;
    }
    .tabs {
        display: flex;
        background: var(--bg-card);
        margin-bottom: 15px;
    }
    .tabs button {
        flex: 1;
        padding: 15px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        border-bottom: 3px solid transparent;
    }
    .tabs button.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
        background: rgba(0, 230, 118, 0.05);
    }
    .container { 
        display: none; 
        padding: 15px; 
        max-width: 800px; 
        margin: 0 auto; 
    }
    .card {
        background: var(--bg-card);
        padding: 20px;
        margin-bottom: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    h3 { margin-top: 0; margin-bottom: 15px; font-size: 18px; color: var(--text); display: flex; align-items: center; gap: 8px;}
    label { font-size: 12px; color: var(--text-muted); display: block; margin-top: 8px; }
    input, select {
        width: 100%;
        padding: 12px;
        margin: 6px 0 12px 0;
        border: 1px solid #2d3446;
        border-radius: 8px;
        background: var(--bg-input);
        color: white;
        box-sizing: border-box;
    }
    #loginBox input[type="email"], #loginBox input[type="password"] {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #2a2e3d;
        background: #0f111a;
        color: white;
    }
    #loginBox input:focus {
        outline: none;
        border-color: #00e676;
    }
    #loginBox button {
        width: 100%;
        padding: 12px;
        font-weight: bold;
        margin-top: 10px;
    }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    .btn:hover { filter: brightness(1.2); }
    .btn-success { background: var(--accent); color: #000; }
    .btn-primary { background: var(--primary); }
    .btn-warning { background: var(--warning); }
    .btn-danger { background: var(--danger); }
    
    .item {
        background: var(--bg-input);
        padding: 12px;
        margin: 8px 0;
        border-radius: 8px;
        border-left: 4px solid var(--primary);
    }
    .item.vale { border-left-color: var(--danger); }
    .saldo-destaque { font-size: 24px; font-weight: bold; margin-bottom: 15px; color: var(--accent); }
    .hidden { display: none !important; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 10px; border-bottom: 1px solid #2d3446; text-align: center; }
    th { color: var(--text-muted); font-size: 12px; }

    #toast {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: var(--accent); color: #000; padding: 12px 25px;
        border-radius: 30px; font-weight: bold; opacity: 0; transition: .3s; z-index: 9999;
    }
    #toast.show { opacity: 1; }

    /* MODAL EXCLUSIVO PARA COMPATIBILIDADE COM APLICATIVOS */
    .custom-modal {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100000;
    }
    .modal-content {
        background: var(--bg-card);
        padding: 25px;
        border-radius: 12px;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    @media print {
        body { background: white; color: black; }
        .tabs, input, select, button, .btn, .card:has(input), header, #loginBox { display: none !important; }
        .card { background: white; color: black; box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
        .item { background: #f5f5f5; color: black; border: 1px solid #ddd; }
    }
</style>
</head>
<body>

<div id="loginBox" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0f111a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
">
    <form onsubmit="entrarSistema(event)" style="
        background: #161925;
        padding: 40px;
        border-radius: 15px;
        width: 360px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    ">
        <h2 style="text-align: center; color: white; margin-top: 0; margin-bottom: 20px;">
            🔐 Oficina Bravo
        </h2>
        <input id="emailLogin" type="email" placeholder="E-mail" required>
        <input id="senhaLogin" type="password" placeholder="Palavra-passe" required>
        
        <div style="display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-muted);">
            <input type="checkbox" id="lembrar" style="width: auto; margin: 0; cursor: pointer;">
            <label for="lembrar" style="margin: 0; cursor: pointer; user-select: none;">Lembrar meus dados</label>
        </div>

        <button type="submit" class="btn btn-success">
            ENTRAR
        </button>
        <p id="erroLogin" style="color: #ff1744; text-align: center; margin-top: 15px; margin-bottom: 0; font-size: 14px; font-weight: 500;"></p>
    </form>
</div>

<header>📋 Controle Financeiro PRO</header>
<button onclick="sairSistema()" style="
    position: absolute;
    top: 15px;
    right: 15px;
    background: #ff1744;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    z-index: 10000;
    font-size: 14px;
">🚪 Sair</button>

<div class="tabs">
    <button id="tab-ind" class="active" onclick="show('individual')">👤 Mecânicos / Individual</button>
    <button id="tab-ger" onclick="show('geral')">🌐 Relatório Geral & Ranking</button>
</div>

<div class="container">

    <div class="card">
        <h3>📅 Filtro de Período Geral</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>De:</label>
                <input type="date" id="filtroInicio" onchange="globalRefresh()">
            </div>
            <div>
                <label>Até:</label>
                <input type="date" id="filtroFim" onchange="globalRefresh()">
            </div>
        </div>
    </div>

    <div id="individualBox">
        <div class="card">
            <h3>⚙️ Configuração Geral</h3>
            <label>Taxa de Retenção da Empresa (%)</label>
            <input id="taxa" type="number" placeholder="Ex: 20">
            <button class="btn btn-success" onclick="salvarTaxa()">💾 Salvar Taxa</button>
        </div>

        <div class="card">
            <h3>👤 Cadastrar Novo Mecânico</h3>
            <input id="nome" placeholder="Nome do Mecânico">
            <input id="telefone" placeholder="Telefone (Ex: 5591982976479)">
            <button class="btn btn-success" onclick="addUser()">➕ Adicionar Mecânico</button>
        </div>

        <div class="card">
            <h3>💸 Novo Lançamento</h3>
            <label>Selecionar Mecânico</label>
            <select id="userSelect" onchange="autoRender()"></select>
            
            <label>Valor (R$)</label>
            <input id="valor" type="number" placeholder="0.00">
            
            <label>Descrição do Serviço</label>
            <input id="desc" placeholder="Ex: Alinhamento, Troca de Óleo...">
            
            <label>Tipo</label>
            <select id="tipo">
                <option value="acrescimo">➕ Ganho (Serviço executado)</option>
                <option value="vale">🧾 Gasto (Vale / Retirada)</option>
            </select>
            <button class="btn btn-success" onclick="addPayment()">💾 Gravar Lançamento</button>
        </div>

        <div class="card">
            <h3>📊 Desempenho no Período</h3>
            <canvas id="chart" style="max-height: 220px;"></canvas>
        </div>

        <div class="card" id="resumo"></div>
        
        <div class="card">
            <h3>📜 Histórico de Lançamentos</h3>
            <div id="listaLancamentos"></div>
        </div>
    </div>

    <div id="geralBox" class="hidden">
        <div class="card">
            <h3>🏢 Gastos Operacionais da Empresa</h3>
            <input id="gastoValor" type="number" placeholder="Valor R$">
            <input id="gastoDesc" placeholder="Descrição do Gasto">
            <button class="btn btn-success" onclick="addGastoEmpresa()">➕ Registrar Gasto</button>
            <div id="listaGastosEmpresa" style="margin-top: 15px;"></div>
        </div>

        <div class="card" id="resumoGeral"></div>
        
        <div class="card">
            <h3>🏆 Ranking de Mecânicos no Período</h3>
            <div id="rankingMecanicos"></div>
        </div>
    </div>

</div>

<div id="modalConfirmacao" class="custom-modal">
    <div class="modal-content">
        <h3 id="modalConfirmTitulo">Confirmar ação</h3>
        <p id="modalConfirmTexto" style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;"></p>
        <div class="btn-group">
            <button class="btn btn-danger" id="modalConfirmBtnSim">Confirmar</button>
            <button class="btn" style="background:#555" onclick="fecharModal('modalConfirmacao')">Cancelar</button>
        </div>
    </div>
</div>

<div id="modalEdicao" class="custom-modal">
    <div class="modal-content">
        <h3>✏️ Editar Lançamento</h3>
        <label>Valor (R$)</label>
        <input type="number" id="editModalValor">
        <label>Descrição</label>
        <input type="text" id="editModalDesc">
        <div class="btn-group">
            <button class="btn btn-success" id="modalEditBtnSalvar">Salvar</button>
            <button class="btn" style="background:#555" onclick="fecharModal('modalEdicao')">Cancelar</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://spampthijhzrobleoqrk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_WTdbepY0NYEQ6gERzWAlKQ_OEbOhqVK';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
        persistSession: true,
        autoRefreshToken: true
    }
});

let listaMecanicos = [];
let listaLancamentos = [];
let listaGastosEmpresa = [];
let taxa = 20;
let chart;
let currentTab = "individual";
let usuarioAtual = null;

const hoje = new Date();
document.getElementById('filtroInicio').value = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toISOString().split('T')[0];
document.getElementById('filtroFim').value = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0).toISOString().split('T')[0];

// Auxiliares para controle dos modais de forma assíncrona
function abrirModal(id) {
    document.getElementById(id).style.display = 'flex';
}
function fecharModal(id) {
    document.getElementById(id).style.display = 'none';
}

function customConfirm(titulo, mensagem) {
    return new Promise((resolve) => {
        document.getElementById('modalConfirmTitulo').innerText = titulo;
        document.getElementById('modalConfirmTexto').innerText = mensagem;
        abrirModal('modalConfirmacao');
        
        document.getElementById('modalConfirmBtnSim').onclick = function() {
            fecharModal('modalConfirmacao');
            resolve(true);
        };
    });
}

async function verificarSessaoAtiva() {
    try {
        const savedEmail = localStorage.getItem("oficina_email");
        const savedPass = localStorage.getItem("oficina_senha");
        
        if (savedEmail && savedPass) {
            document.getElementById("emailLogin").value = savedEmail;
            document.getElementById("senhaLogin").value = savedPass;
            document.getElementById("lembrar").checked = true;
        }

        const { data: { session }, error } = await db.auth.getSession();
        
        if (session) {
            usuarioAtual = session.user;
            document.getElementById("loginBox").style.display = "none";
            document.querySelector(".container").style.display = "block";
            await fetchDataFromSupabase();
        } else {
            document.getElementById("loginBox").style.display = "flex";
            document.querySelector(".container").style.display = "none";
        }
    } catch (err) {
        console.error("Erro na verificação de sessão ativa:", err);
    }
}

async function entrarSistema(event) {
    if (event) event.preventDefault();

    let email = document.getElementById("emailLogin").value.trim();
    let senha = document.getElementById("senhaLogin").value;
    let lembrarCheckbox = document.getElementById("lembrar").checked;
    let erroBox = document.getElementById("erroLogin");

    erroBox.innerHTML = "A carregar...";

    const { data, error } = await db.auth.signInWithPassword({
        email: email,
        password: senha
    });

    if (error) {
        console.error("Erro no login:", error);
        erroBox.innerHTML = "❌ Erro: " + error.message;
        return;
    }

    if (lembrarCheckbox) {
        localStorage.setItem("oficina_email", email);
        localStorage.setItem("oficina_senha", senha);
    } else {
        localStorage.removeItem("oficina_email");
        localStorage.removeItem("oficina_senha");
    }

    usuarioAtual = data.user;
    document.getElementById("loginBox").style.display = "none";
    document.querySelector(".container").style.display = "block";
    toast("✅ Login realizado com sucesso!");
    await fetchDataFromSupabase();
}

async function sairSistema() {
    await db.auth.signOut();
    usuarioAtual = null;
    
    if (!document.getElementById("lembrar").checked) {
        document.getElementById("emailLogin").value = "";
        document.getElementById("senhaLogin").value = "";
    }
    
    document.getElementById("erroLogin").innerHTML = "";
    document.getElementById("loginBox").style.display = "flex";
    document.querySelector(".container").style.display = "none";
}

function toast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),2000);
}

function show(type){
    currentTab = type;
    document.getElementById("individualBox").classList.toggle("hidden", type!=="individual");
    document.getElementById("geralBox").classList.toggle("hidden", type!=="geral");
    
    document.getElementById("tab-ind").classList.toggle("active", type==="individual");
    document.getElementById("tab-ger").classList.toggle("active", type==="geral");

    globalRefresh();
}

async function fetchDataFromSupabase() {
    try {
        let { data: mec, error: errMec } = await db.from('mecanicos').select('*');
        if (!errMec) listaMecanicos = mec || [];

        let { data: lan, error: errLan } = await db.from('lancamentos').select('*');
        if (!errLan) listaLancamentos = lan || [];

        let { data: gas, error: errGas } = await db.from('gastos_empresa').select('*');
        if (!errGas) listaGastosEmpresa = gas || [];

        let { data: config, error: errConf } = await db.from('configuracoes').select('*').eq('chave', 'taxa_retencao').single();
        if (!errConf && config) {
            taxa = Number(config.valor);
            document.getElementById('taxa').value = taxa;
        }

        updateUserSelectUI();
        globalRefresh();
    } catch (e) {
        console.error("Erro ao buscar dados do Supabase:", e);
    }
}

function globalRefresh() {
    if(currentTab === "geral") {
        renderGeral();
    } else {
        let u = document.getElementById("userSelect").value;
        if(u) renderUser(u);
    }
}

async function salvarTaxa(){
    const inputTaxa = Number(document.getElementById("taxa").value);
    
    const { error } = await db.from('configuracoes').upsert(
        { chave: 'taxa_retencao', valor: inputTaxa.toString() },
        { onConflict: 'chave' }
    );

    if (error) return alert("Erro ao salvar taxa: " + error.message);
    
    taxa = inputTaxa;
    toast('✅ Taxa updated!');
    globalRefresh();
}

async function addUser(){
    let nome = document.getElementById("nome").value.trim();
    let telefone = document.getElementById("telefone").value.trim().replace(/\D/g, "");

    if(!nome) return alert("Digite o nome do mecânico");

    const { error } = await db.from('mecanicos').insert([{
        nome: nome,
        telefone: telefone || null,
        data_cadastro: new Date().toISOString()
    }]);

    if (error) return alert("Erro ao salvar mecânico: " + error.message);

    document.getElementById("nome").value = "";
    document.getElementById("telefone").value = "";
    toast('✅ Mecânico adicionado!');
    await fetchDataFromSupabase();
}

async function addPayment(){
    let user = document.getElementById("userSelect").value;
    let valor = Number(document.getElementById("valor").value);
    let tipo = document.getElementById("tipo").value;
    let desc = document.getElementById("desc").value || "Sem descrição";

    if(!user || !valor) return alert("Selecione o mecânico e informe o valor");

    const { error } = await db.from('lancamentos').insert([{
        mecanico: user,
        valor: valor,
        tipo: tipo,
        desc: desc,
        data: new Date().toISOString()
    }]);

    if (error) return alert("Erro ao gravar lançamento: " + error.message);

    document.getElementById("valor").value = "";
    document.getElementById("desc").value = "";
    toast('✅ Lançamento gravado!');
    await fetchDataFromSupabase();
}

function calc(nome){
    let ganhos=0, gastos=0;
    let ini = new Date(document.getElementById('filtroInicio').value + 'T00:00:00');
    let fim = new Date(document.getElementById('filtroFim').value + 'T23:59:59');

    let filtrados = listaLancamentos.filter(x => {
        let d = new Date(x.data);
        return x.mecanico === nome && d >= ini && d <= fim;
    });

    filtrados.forEach(x=>{
        if(x.tipo==="vale") gastos+=x.valor;
        else ganhos+=x.valor;
    });

    let taxaValor = ganhos*(taxa/100);
    const totalServicos = filtrados.filter(x => x.tipo === "acrescimo").length;
    return {ganhos, gastos, taxaValor, saldo: ganhos - gastos - taxaValor, totalServicos, filtrados};
}

async function pagarUser(nome){
    let confirmacao = await customConfirm("Fechar Conta", `Deseja zerar o histórico completo de lançamentos de ${nome} no banco de dados?`);
    if(confirmacao){
        const { error } = await db.from('lancamentos').delete().eq('mecanico', nome);
        if (error) return alert("Erro ao limpar dados: " + error.message);
        
        toast('✔ Conta fechada!');
        await fetchDataFromSupabase();
    }
}

async function deleteItem(user, id){
    let confirmacao = await customConfirm("Excluir Item", "Tem certeza que deseja excluir este lançamento permanentemente?");
    if(confirmacao) {
        const { error } = await db.from('lancamentos').delete().eq('id', id);
        if (error) return alert("Erro ao remover: " + error.message);
        
        toast('🗑️ Item removido!');
        await fetchDataFromSupabase();
    }
}

function editItem(user, id){
    let item = listaLancamentos.find(x => x.id === id);
    if(!item) return;

    document.getElementById("editModalValor").value = item.valor;
    document.getElementById("editModalDesc").value = item.desc;
    abrirModal('modalEdicao');

    document.getElementById("modalEditBtnSalvar").onclick = async function() {
        let novoValor = Number(document.getElementById("editModalValor").value);
        let novaDesc = document.getElementById("editModalDesc").value;

        if(!novoValor || !novaDesc) return alert("Preencha todos os campos!");

        let dadosAtualizados = {
            valor: novoValor,
            desc: novaDesc
        };

        const { error } = await db.from('lancamentos').update(dadosAtualizados).eq('id', id);
        if (error) {
            alert("Erro ao atualizar: " + error.message);
            return;
        }

        fecharModal('modalEdicao');
        toast('✏️ Item atualizado!');
        await fetchDataFromSupabase();
    };
}

function enviarWhatsApp(nome){
    let r = calc(nome);
    let mecObj = listaMecanicos.find(m => m.nome === nome);
    let fone = mecObj ? mecObj.telefone : null;
    
    if(!fone) return alert("Não há telefone cadastrado para este mecânico.");

    let text = `*Resumo Financeiro - ${nome}*\n\n` +
                `📅 Período: ${document.getElementById('filtroInicio').value} até ${document.getElementById('filtroFim').value}\n` +
                `💰 *Ganhos Brutos:* R$ ${r.ganhos.toFixed(2)}\n` +
                `🧾 *Vales/Gastos:* R$ ${r.gastos.toFixed(2)}\n` +
                `📉 *Taxa Oficina (${taxa}%):* R$ ${r.taxaValor.toFixed(2)}\n` +
                `-----------------------------\n` +
                `💵 *Saldo Líquido a Receber:* R$ ${r.saldo.toFixed(2)}`;
    
    window.open(`https://api.whatsapp.com/send?phone=${fone}&text=${encodeURIComponent(text)}`, '_blank');
}

function renderUser(nome){
    if(!nome) return;
    let r = calc(nome);

    if(chart) chart.destroy();
    
    chart = new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels: r.filtrados.map(x=> x.desc.substring(0,10)),
            datasets:[{
                label: 'Movimentações (R$)',
                data: r.filtrados.map(x=> x.tipo==="vale" ? -x.valor : x.valor),
                backgroundColor: r.filtrados.map(x=> x.tipo==="vale" ? '#ff1744' : '#00e676')
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });

    document.getElementById("resumo").innerHTML=`
        <div class="saldo-destaque">👤 ${nome}</div>
        <div class="saldo-destaque" style="color:${r.saldo >= 0 ? '#00e676':'#ff1744'}">💵 Saldo Líquido: R$ ${r.saldo.toFixed(2)}</div>
        <div style="margin-bottom: 15px;">
            <div>🔧 Serviços Executados: ${r.totalServicos}</div><div>💰 Produção Bruta: R$ ${r.ganhos.toFixed(2)}</div>
            <div>🧾 Vales Retirados: R$ ${r.gastos.toFixed(2)}</div>
            <div>📉 Retenção Oficina (${taxa}%): R$ ${r.taxaValor.toFixed(2)}</div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="enviarWhatsApp('${nome}')">💬 Enviar WhatsApp</button>
            <button class="btn btn-warning" onclick="window.print()">🖨️ Exportar Período</button>
        </div>
        <button class="btn btn-danger" style="margin-top:10px;" onclick="pagarUser('${nome}')">✔ Fechar Conta / Zerar Histórico</button>
    `;

    document.getElementById("listaLancamentos").innerHTML = r.filtrados.map(i=>`
        <div class="item ${i.tipo}">
            <strong>${i.tipo === 'vale' ? '🧾 GASTO/VALE' : '➕ GANHO'}</strong> - R$ ${i.valor.toFixed(2)}<br>
            <small>${i.desc}</small> <br>
            <span style="font-size:10px; color:var(--text-muted)">${new Date(i.data).toLocaleDateString()}</span>
            <div class="btn-group" style="grid-template-columns: 1fr 1fr; margin-top:5px;">
                <button class="btn btn-warning" style="padding:4px; font-size:12px;" onclick="editItem('${i.mecanico}',${i.id})">Editar</button>
                <button class="btn btn-danger" style="padding:4px; font-size:12px;" onclick="deleteItem('${i.mecanico}',${i.id})">Excluir</button>
            </div>
        </div>
    `).join("");
}

function autoRender(){
    let u = document.getElementById("userSelect").value;
    if(u) renderUser(u);
}

function updateUserSelectUI(){
    let sel=document.getElementById("userSelect");
    let atual = sel.value;
    sel.innerHTML="";

    listaMecanicos.forEach(m=>{
        let o=document.createElement("option");
        o.value=m.nome; o.text=m.nome;
        sel.appendChild(o);
    });

    if(atual && listaMecanicos.some(m => m.nome === atual)) sel.value = atual;
    if(sel.value && !atual) renderUser(sel.value);
}

async function addGastoEmpresa(){
    let v=Number(document.getElementById("gastoValor").value);
    let d=document.getElementById("gastoDesc").value || "Gasto Geral";
    if(!v) return;

    const { error } = await db.from('gastos_empresa').insert([{
        valor: v,
        desc: d,
        data: new Date().toISOString()
    }]);

    if(error) return alert("Erro ao registrar gasto: " + error.message);

    document.getElementById("gastoValor").value="";
    document.getElementById("gastoDesc").value="";
    toast('💸 Gasto registrado!');
    await fetchDataFromSupabase();
}

async function removerGastoEmpresa(id){
    let confirmacao = await customConfirm("Excluir Gasto", "Deseja realmente excluir este gasto operacional da empresa?");
    if(confirmacao) {
        const { error } = await db.from('gastos_empresa').delete().eq('id', id);
        if(error) return alert("Erro ao remover gasto: " + error.message);
        
        toast('🗑️ Gasto removido!');
        await fetchDataFromSupabase();
    }
}

function renderGeral(){
    let totalG=0, totalT=0;
    let ranking = [];
    
    let ini = new Date(document.getElementById('filtroInicio').value + 'T00:00:00');
    let fim = new Date(document.getElementById('filtroFim').value + 'T23:59:59');

    listaMecanicos.forEach(m=>{
        let r=calc(m.nome);
        totalG+=r.ganhos;
        totalT+=r.taxaValor;
        ranking.push({nome: m.nome, faturamento: r.ganhos});
    });

    ranking.sort((a,b) => b.faturamento - a.faturamento);

    let gastosEmpFiltrados = listaGastosEmpresa.filter(g => {
        let d = new Date(g.data);
        return d >= ini && d <= fim;
    });

    let gastoEmp = gastosEmpFiltrados.reduce((a,b)=>a+b.valor,0);
    let lucro = totalT - gastoEmp;
    let totalServicosOficina = listaMecanicos.reduce((t,m)=>t+calc(m.nome).totalServicos,0);

    document.getElementById("resumoGeral").innerHTML=`
        <h3>📊 Balanço Geral Oficina (No Período)</h3>
        <div class="saldo-destaque" style="color:${lucro >= 0 ? '#00e676':'#ff1744'}">🏢 Lucro Líquido: R$ ${lucro.toFixed(2)}</div>
        <div>💰 Faturamento Total Bruto: R$ ${totalG.toFixed(2)}</div>
        <div>📉 Retenção de Taxas (${taxa}%): R$ ${totalT.toFixed(2)}</div>
        <div>🔧 Total de Serviços: ${totalServicosOficina}</div><div>💸 Gastos Operacionais: R$ ${gastoEmp.toFixed(2)}</div>
        <button class="btn btn-warning" style="margin-top:15px;" onclick="window.print()">🖨️ Imprimir Balanço Geral</button>
    `;

    document.getElementById("rankingMecanicos").innerHTML=`<div style="overflow-x:auto">
<table style="width:100%;border-collapse:collapse">
<thead><tr>
<th>#</th><th>Mecânico</th><th>Serviços</th><th>Produção</th><th>Vales</th><th>Retenção</th><th>Saldo</th>
</tr></thead><tbody>
${ranking.map((m,idx)=>{let r=calc(m.nome);return `<tr>
<td>${idx+1}</td>
<td>${m.nome}</td>
<td>${r.totalServicos}</td>
<td>R$ ${r.ganhos.toFixed(2)}</td>
<td>R$ ${r.gastos.toFixed(2)}</td>
<td>R$ ${r.taxaValor.toFixed(2)}</td>
<td>R$ ${r.saldo.toFixed(2)}</td>
</tr>`}).join('')}
</tbody></table></div>`;

    document.getElementById("listaGastosEmpresa").innerHTML = gastosEmpFiltrados.map(g=>`
        <div class="item vale">
            R$ ${g.valor.toFixed(2)} - ${g.desc} <br>
            <span style="font-size:10px; color:var(--text-muted)">${new Date(g.data).toLocaleDateString()}</span>
            <button class="btn btn-danger" style="padding:4px; margin-top:5px; font-size:12px;" onclick="removerGastoEmpresa(${g.id})">Excluir</button>
        </div>
    `).join("");
}

verificarSessaoAtiva();
show("individual");
</script>
</body>
</html>
